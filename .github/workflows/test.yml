name: Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, 12, 13]

        exclude:
          # Laravel 10 / Testbench 8 incompatibles avec PHP 8.4
          - laravel: 10
            php: 8.4

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo
          coverage: none
          tools: composer:v2
          cache: composer

      - name: Validate composer.json
        run: composer validate --strict

      - name: Select Testbench version
        id: testbench
        run: |
          if   [ "${{ matrix.laravel }}" = "10" ]; then echo "version=^8.0" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.laravel }}" = "11" ]; then echo "version=^9.0" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.laravel }}" = "12" ]; then echo "version=^10.0" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.laravel }}" = "13" ]; then echo "version=^11.0" >> $GITHUB_OUTPUT
          fi

      - name: Select PHPUnit version
        id: phpunit
        run: |
          if   [ "${{ matrix.laravel }}" = "10" ]; then echo "version=^10.0" >> $GITHUB_OUTPUT
          else echo "version=^11.0" >> $GITHUB_OUTPUT
          fi

      - name: Require compatible dependencies
        run: |
          composer require \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "illuminate/console:^${{ matrix.laravel }}.0" \
            "illuminate/filesystem:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:${{ steps.testbench.outputs.version }}" \
            "phpunit/phpunit:${{ steps.phpunit.outputs.version }}" \
            --dev \
            --no-interaction \
            --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
